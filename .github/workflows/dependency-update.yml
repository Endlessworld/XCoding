name: Dependency Update Check

on:
  schedule:
    # 每周一早上 8:00 检查
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  check-updates:
    name: Check Dependency Updates
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/gradle-build-action@v3
      
    - name: Check for dependency updates
      run: |
        ./gradlew dependencyUpdates --no-daemon --output-file=dependency-updates.txt
        
    - name: Generate update report
      run: |
        echo "# 依赖更新报告" > update-report.md
        echo "" >> update-report.md
        echo "生成时间: $(date)" >> update-report.md
        echo "" >> update-report.md
        cat dependency-updates.txt >> update-report.md
        
    - name: Upload dependency report
      uses: actions/upload-artifact@v4
      with:
        name: dependency-report
        path: |
          dependency-updates.txt
          update-report.md
        retention-days: 30
        
    - name: Create Issue for updates (if needed)
      if: contains(steps.dependency-check.outputs.stdout, 'updates')
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const report = fs.readFileSync('update-report.md', 'utf8');
          
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: `依赖更新检查 - ${new Date().toISOString().split('T')[0]}`,
            body: report,
            labels: ['dependencies', 'maintenance']
          });
