name: Gradle Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    name: Gradle Build
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/gradle-build-action@v3
      with:
        gradle-home-cache-cleanup: true
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
        
    - name: Run Gradle build
      run: ./gradlew build --no-daemon --info
      
    - name: Run tests
      run: ./gradlew test --no-daemon --continue
      
    - name: Build fat JAR
      run: ./gradlew :library:fatJar --no-daemon
      
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: gradle-build-artifacts
        path: |
          library/build/libs/*.jar
          library/build/reports/**/*
          library/build/test-results/**/*
        retention-days: 7
        
    - name: Generate dependency tree
      run: ./gradlew :library:dependencies --configuration runtimeClasspath > library/build/reports/dependency.txt
      
    - name: Upload dependency report
      uses: actions/upload-artifact@v4
      with:
        name: dependency-report
        path: library/build/reports/dependency.txt
        retention-days: 7
