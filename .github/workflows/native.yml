name: Native Build

on:
  push:
    branches: [ dev, test, main ]
  pull_request:
    branches: [ dev, test, main ]
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build (all, linux, macos, windows)'
        required: false
        default: 'all'
        type: choice
        options:
        - all
        - linux
        - macos
        - windows

env:
  GRAALVM_VERSION: '23.1.0'
  JAVA_VERSION: '17'

jobs:
  native-linux:
    name: Native Linux
    runs-on: ubuntu-latest
    if: github.event.inputs.platform == 'all' || github.event.inputs.platform == 'linux' || github.event.inputs.platform == ''
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up GraalVM
      uses: graalvm/setup-graalvm@v1
      with:
        graalvm-version: ${{ env.GRAALVM_VERSION }}
        java-version: ${{ env.JAVA_VERSION }}
        components: 'native-image'
        
    - name: Verify GraalVM installation
      run: native-image --version
      
    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-native-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libssl-dev
        
    - name: Build native executable
      run: ./gradlew :library:nativeCompile
      
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: native-linux
        path: library/build/native/nativeCompile/XAgent

  native-macos:
    name: Native macOS
    runs-on: macos-latest
    if: github.event.inputs.platform == 'all' || github.event.inputs.platform == 'macos' || github.event.inputs.platform == ''
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up GraalVM
      uses: graalvm/setup-graalvm@v1
      with:
        graalvm-version: ${{ env.GRAALVM_VERSION }}
        java-version: ${{ env.JAVA_VERSION }}
        components: 'native-image'
        
    - name: Verify GraalVM installation
      run: native-image --version
      
    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-native-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build native executable
      run: ./gradlew :library:nativeCompile
      
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: native-macos
        path: library/build/native/nativeCompile/XAgent

  native-windows:
    name: Native Windows
    runs-on: windows-latest
    if: github.event.inputs.platform == 'all' || github.event.inputs.platform == 'windows' || github.event.inputs.platform == ''
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up GraalVM
      uses: graalvm/setup-graalvm@v1
      with:
        graalvm-version: ${{ env.GRAALVM_VERSION }}
        java-version: ${{ env.JAVA_VERSION }}
        components: 'native-image'
        
    - name: Verify GraalVM installation
      run: native-image --version
        
    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-native-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Build native executable
      run: ./gradlew.bat :library:nativeCompile
      
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: native-windows
        path: library/build/native/nativeCompile/XAgent.exe
