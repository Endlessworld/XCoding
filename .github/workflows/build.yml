name: Build and Native Compile

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  GRAALVM_VERSION: '23.1.0'
  JAVA_VERSION: '17'

jobs:
  # 常规构建测试
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        
    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build project
      run: ./gradlew build
      
    - name: Run tests
      run: ./gradlew test
      
    - name: Build fat JAR
      run: ./gradlew :library:fatJar
      
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: |
          library/build/libs/*.jar
          library/build/distributions/*
        retention-days: 30

  # Linux 原生编译
  native-linux:
    name: Native Linux
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up GraalVM
      uses: graalvm/setup-graalvm@v1
      with:
        graalvm-version: ${{ env.GRAALVM_VERSION }}
        java-version: ${{ env.JAVA_VERSION }}
        components: 'native-image'
        
    - name: Verify GraalVM installation
      run: |
        echo "GRAALVM_HOME: $GRAALVM_HOME"
        echo "JAVA_HOME: $JAVA_HOME"
        native-image --version
        
    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-native-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          ${{ runner.os }}-gradle-native-
          
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Install native-image dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libssl-dev
        
    - name: Build native executable
      run: ./gradlew :library:nativeCompile
      
    - name: Upload Linux native artifact
      uses: actions/upload-artifact@v4
      with:
        name: native-linux
        path: library/build/native/nativeCompile/XAgent
        retention-days: 30

  # macOS 原生编译
  native-macos:
    name: Native macOS
    runs-on: macos-latest
    needs: build
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up GraalVM
      uses: graalvm/setup-graalvm@v1
      with:
        graalvm-version: ${{ env.GRAALVM_VERSION }}
        java-version: ${{ env.JAVA_VERSION }}
        components: 'native-image'
        
    - name: Verify GraalVM installation
      run: |
        echo "GRAALVM_HOME: $GRAALVM_HOME"
        echo "JAVA_HOME: $JAVA_HOME"
        native-image --version
        
    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-native-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          ${{ runner.os }}-gradle-native-
          
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build native executable
      run: ./gradlew :library:nativeCompile
      
    - name: Upload macOS native artifact
      uses: actions/upload-artifact@v4
      with:
        name: native-macos
        path: library/build/native/nativeCompile/XAgent
        retention-days: 30

  # Windows 原生编译
  native-windows:
    name: Native Windows
    runs-on: windows-latest
    needs: build
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up GraalVM
      uses: graalvm/setup-graalvm@v1
      with:
        graalvm-version: ${{ env.GRAALVM_VERSION }}
        java-version: ${{ env.JAVA_VERSION }}
        components: 'native-image'
        
    - name: Verify GraalVM installation
      run: |
        echo "GRAALVM_HOME: $GRAALVM_HOME"
        echo "JAVA_HOME: $JAVA_HOME"
        native-image --version
        
    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-native-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          ${{ runner.os }}-gradle-native-
          
    - name: Build native executable
      run: ./gradlew.bat :library:nativeCompile
      
    - name: Upload Windows native artifact
      uses: actions/upload-artifact@v4
      with:
        name: native-windows
        path: library/build/native/nativeCompile/XAgent.exe
        retention-days: 30

  # 发布构建
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build, native-linux, native-macos, native-windows]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        name: Release ${{ github.sha }}
        body: |
          自动构建发布
          
          ## 构建产物
          - **Fat JAR**: 包含所有依赖的可执行 JAR 文件
          - **Native Linux**: Linux 原生可执行文件
          - **Native macOS**: macOS 原生可执行文件  
          - **Native Windows**: Windows 原生可执行文件
          
          ## 使用方法
          
          ### Fat JAR
          ```bash
          java -jar XAgent-0.0.1-all.jar
          ```
          
          ### Native 可执行文件
          ```bash
          # Linux/macOS
          ./XAgent
          
          # Windows
          XAgent.exe
          ```
        files: |
          artifacts/build-artifacts/**/*.jar
          artifacts/native-linux/XAgent
          artifacts/native-macos/XAgent
          artifacts/native-windows/XAgent.exe
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
