name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        type: string
      prerelease:
        description: 'Is this a prerelease?'
        required: false
        type: boolean
        default: false

env:
  GRAALVM_VERSION: '23.1.0'
  JAVA_VERSION: '17'

jobs:
  # 构建验证
  verify:
    name: Verify Build
    runs-on: ubuntu-latest
    
    outputs:
      version: ${{ steps.version.outputs.version }}
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/gradle-build-action@v3
      
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Determine version
      id: version
      run: |
        if [[ "${{ github.event_name }}" == "push" && "${{ github.ref_type }}" == "tag" ]]; then
          VERSION=${{ github.ref_name }}
        else
          VERSION=${{ github.event.inputs.version }}
        fi
        echo "version=${VERSION#v}" >> $GITHUB_OUTPUT
        echo "Release version: ${VERSION#v}"
        
    - name: Run tests
      run: ./gradlew test --no-daemon
      
    - name: Build project
      run: ./gradlew build --no-daemon

  # 跨平台原生编译
  build-native:
    name: Native ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: verify
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up GraalVM
      uses: graalvm/setup-graalvm@v1
      with:
        graalvm-version: ${{ env.GRAALVM_VERSION }}
        java-version: ${{ env.JAVA_VERSION }}
        components: 'native-image'
        
    - name: Verify GraalVM installation
      run: native-image --version
      
    - name: Setup Gradle
      uses: gradle/gradle-build-action@v3
      
    - name: Build native executable
      shell: bash
      run: |
        if [[ "$RUNNER_OS" == "Windows" ]]; then
          ./gradlew.bat :library:nativeCompile --no-daemon
        else
          ./gradlew :library:nativeCompile --no-daemon
        fi
        
    - name: Upload native artifact
      uses: actions/upload-artifact@v4
      with:
        name: native-${{ matrix.os }}
        path: |
          library/build/native/nativeCompile/XAgent*
        retention-days: 1

  # 构建 JAR
  build-jar:
    name: Build JAR
    runs-on: ubuntu-latest
    needs: verify
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/gradle-build-action@v3
      
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build fat JAR
      run: ./gradlew :library:fatJar --no-daemon
      
    - name: Upload JAR artifact
      uses: actions/upload-artifact@v4
      with:
        name: jar-artifact
        path: library/build/libs/*.jar
        retention-days: 1

  # 创建发布
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-native, build-jar]
    if: always() && (needs.build-native.result == 'success' || needs.build-native.result == 'skipped') && needs.build-jar.result == 'success'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        
    - name: Prepare release assets
      run: |
        mkdir -p release-assets
        
        # 复制 JAR 文件
        cp artifacts/jar-artifact/*.jar release-assets/
        
        # 复制原生可执行文件并重命名
        if [ -f "artifacts/native-ubuntu-latest/XAgent" ]; then
          cp artifacts/native-ubuntu-latest/XAgent release-assets/XAgent-linux
        fi
        
        if [ -f "artifacts/native-macos-latest/XAgent" ]; then
          cp artifacts/native-macos-latest/XAgent release-assets/XAgent-macos
        fi
        
        if [ -f "artifacts/native-windows-latest/XAgent.exe" ]; then
          cp artifacts/native-windows-latest/XAgent.exe release-assets/XAgent-windows.exe
        fi
        
        # 创建校验和
        cd release-assets
        sha256sum * > sha256sums.txt
        cd ..
        
        # 列出文件
        ls -la release-assets/
        
    - name: Generate changelog
      id: changelog
      run: |
        # 获取上一个标签
        PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
        
        if [ -n "$PREV_TAG" ]; then
          echo "## 变更记录" > changelog.md
          echo "" >> changelog.md
          echo "自 $PREV_TAG 以来的变更:" >> changelog.md
          echo "" >> changelog.md
          git log --pretty=format:"- %s (%h)" $PREV_TAG..HEAD >> changelog.md
        else
          echo "## 变更记录" > changelog.md
          echo "" >> changelog.md
          echo "初始发布" >> changelog.md
        fi
        
        echo "changelog<<EOF" >> $GITHUB_OUTPUT
        cat changelog.md >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        name: Release ${{ needs.verify.outputs.version }}
        body: |
          # XAgent ${{ needs.verify.outputs.version }}
          
          ${{ steps.changelog.outputs.changelog }}
          
          ## 下载说明
          
          ### JAR 文件 (推荐)
          - `XAgent-0.0.1-all.jar`: 包含所有依赖的可执行 JAR 文件
          ```bash
          java -jar XAgent-0.0.1-all.jar
          ```
          
          ### 原生可执行文件
          - `XAgent-linux`: Linux 64位原生可执行文件
          - `XAgent-macos`: macOS 原生可执行文件
          - `XAgent-windows.exe`: Windows 64位原生可执行文件
          
          使用方法:
          ```bash
          # Linux/macOS
          chmod +x XAgent-*
          ./XAgent-linux  # 或 XAgent-macos
          
          # Windows
          XAgent-windows.exe
          ```
          
          ### 校验和
          使用 `sha256sums.txt` 文件验证下载文件的完整性:
          ```bash
          sha256sum -c sha256sums.txt
          ```
          
          ## 系统要求
          
          ### JAR 版本
          - Java 17 或更高版本
          
          ### 原生版本
          - 无需额外依赖
          - Linux: glibc 2.17+
          - macOS: macOS 10.15+
          - Windows: Windows 10+
          
          ## 构建信息
          - GraalVM: ${{ env.GRAALVM_VERSION }}
          - Java: ${{ env.JAVA_VERSION }}
          - 构建时间: ${{ github.event.head_commit.timestamp }}
        files: |
          release-assets/*
        draft: false
        prerelease: ${{ github.event.inputs.prerelease || 'false' }}
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
